<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support — Score.</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="mesh-bg"></div>

    <div class="container">
        <nav>
            <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">Score<span>.</span></a></div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="privacy.html">Privacy</a>
            </div>
        </nav>

        <section class="legal-container">
            <h1 style="font-size: 3rem;">Support<span>.</span></h1>
            <p style="color: var(--text-secondary); margin-bottom: 3rem;">Need help with Score.? We're here to help you get back to your hustle.</p>

            <div class="glass-card">
                <h3 style="margin-bottom: 2rem;">Contact Us</h3>
                <form onsubmit="event.preventDefault(); alert('This is a placeholder. Support logic is coming soon!');">
                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">Your Email</label>
                        <input type="email" placeholder="name@email.com" style="width: 100%; padding: 1rem; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: var(--text-primary);">
                    </div>
                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">How can we help?</label>
                        <textarea rows="5" placeholder="Tell us what's going on..." style="width: 100%; padding: 1rem; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: var(--text-primary);"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </form>
            </div>

            <div style="margin-top: 4rem; text-align: center;">
                <p style="color: var(--text-secondary);">Prefer email? Contact us directly at:</p>
                <a href="mailto:support@scoreapp.pro" style="color: var(--primary); font-size: 1.2rem; text-decoration: none;">support@scoreapp.pro</a>
            </div>
        </section>

        <footer>
            <p>© 2026 Score. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
